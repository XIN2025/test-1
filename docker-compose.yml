services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: founders-form-app
    ports:
      - '3000:3000'
      - 3001:3001
    env_file:
      - apps/web/.env
      - apps/server/.env
    environment:
      - NODE_ENV=development
    restart: on-failure:5
    networks:
      - app_network

networks:
  app_network:
    driver: bridge
